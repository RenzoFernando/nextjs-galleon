name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://taller-nest-nestea.onrender.com/api' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript check
        run: bun run typecheck

      - name: Run ESLint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Build application
        run: bun run build

  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip deploy hook
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured. Render autoDeploy can still deploy from the connected repository."
