services:
  - type: web
    name: nextjs-galleon
    runtime: node
    plan: free
    buildCommand: bun install && bun run build
    startCommand: bun run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
